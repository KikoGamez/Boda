<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>PK IA — Chat de la Boda</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <style>
    :root{
      --bg: #f6f1e7;
      --card: #fbf7f0;
      --ink: #141414;
      --muted: #5c5c5c;
      --gold: #b48a2a;
      --line: rgba(20,20,20,.14);
    }
    *{ box-sizing:border-box; margin:0; }
    body{
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color:var(--ink);
      background:var(--bg);
      height:100dvh; height:-webkit-fill-available;
      display:flex; flex-direction:column;
    }
    .chat-header{
      display:flex; justify-content:space-between; align-items:center;
      padding:16px 18px;
      border-bottom:1px solid var(--line);
      background:rgba(246,241,231,.9);
      flex-shrink:0;
    }
    .chat-header b{ font-size:16px; }
    .chat-header a{
      font-size:13px; font-weight:700; color:var(--gold);
      text-decoration:none;
    }
    .chat-messages{
      flex:1; overflow-y:auto; padding:16px;
      display:flex; flex-direction:column; gap:10px;
    }
    .chat-msg{
      padding:12px 14px; border-radius:16px;
      font-size:15px; line-height:1.45;
      max-width:85%; word-wrap:break-word;
    }
    .chat-msg.user{
      align-self:flex-end;
      background:linear-gradient(180deg,rgba(180,138,42,.18),rgba(180,138,42,.10));
      border:1px solid rgba(180,138,42,.25);
    }
    .chat-msg.bot{
      align-self:flex-start;
      background:rgba(251,247,240,.8);
      border:1px solid rgba(20,20,20,.10);
    }
    .chat-input-row{
      display:flex; gap:8px; padding:12px 16px;
      border-top:1px solid var(--line);
      background:rgba(246,241,231,.9);
      flex-shrink:0;
      padding-bottom:max(12px, env(safe-area-inset-bottom));
    }
    .chat-input-row input{
      flex:1; min-width:0; padding:12px 14px; border-radius:14px;
      border:1px solid rgba(20,20,20,.14);
      background:rgba(246,241,231,.5); font-size:16px; outline:none;
    }
    .btn{
      display:inline-flex; align-items:center; justify-content:center;
      padding:12px 16px; border-radius:14px;
      border:1px solid rgba(180,138,42,.35);
      background:linear-gradient(180deg,rgba(180,138,42,.22),rgba(180,138,42,.12));
      font-weight:900; font-size:14px; cursor:pointer; flex-shrink:0;
    }
  </style>
</head>
<body>
  <div class="chat-header">
    <b>💬 PK IA</b>
    <a href="index.html">Ver web de la boda</a>
  </div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input-row">
    <input id="chatInput" type="text" placeholder="Escribe tu pregunta..." />
    <button id="chatSend" class="btn">Enviar</button>
  </div>

  <script>
    var CHAT_URL = 'https://script.google.com/macros/s/AKfycbxcK80YqDgsV_bU8u4VrDgpOduC9bQJBX1wig2-T2WxXaJLqZYfJUt2v0J_PM2Ganpbqg/exec';
    var chatMessages = document.getElementById('chatMessages');
    var chatInput = document.getElementById('chatInput');
    var chatSend = document.getElementById('chatSend');
    var chatHistory = [];

    function addMsg(role, text) {
      var div = document.createElement('div');
      div.className = 'chat-msg ' + role;
      div.textContent = text;
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    addMsg('bot', 'Hola! Soy PK IA, la asistente virtual de Pat y Kiko. Preguntame lo que quieras sobre la boda!');

    async function sendMsg() {
      var text = chatInput.value.trim();
      if (!text) return;

      addMsg('user', text);
      chatInput.value = '';
      chatHistory.push({ role: 'user', content: text });

      var typing = document.createElement('div');
      typing.className = 'chat-msg bot';
      typing.textContent = '...';
      chatMessages.appendChild(typing);
      chatMessages.scrollTop = chatMessages.scrollHeight;

      try {
        var res = await fetch(CHAT_URL, {
          method: 'POST',
          body: JSON.stringify({ messages: chatHistory })
        });
        var data = await res.json();
        typing.remove();

        var reply = data.reply || 'No he podido responder. Intentalo de nuevo.';
        var rsvpMatch = reply.match(/\[RSVP\|([^|]+)\|([^|]+)\|([^\]]*)\]/);
        if (rsvpMatch) {
          reply = reply.replace(/\s*\[RSVP\|[^\]]*\]/, '');
          submitRSVP(rsvpMatch[1], rsvpMatch[2], rsvpMatch[3]);
        }
        chatHistory.push({ role: 'assistant', content: reply });
        addMsg('bot', reply);
      } catch(err) {
        typing.remove();
        addMsg('bot', 'Ups, algo fallo. Intentalo de nuevo.');
      }
    }

    var RSVP_URL = 'https://script.google.com/macros/s/AKfycbzPFvtlTxw5-JuRUSUqLMPVRX-lYdqJFTqhZtrTO1I4X96w2u2WcUDCn-moQCrIkl9TfQ/exec';
    function submitRSVP(nombre, asistencia, restricciones) {
      fetch(RSVP_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({
          nombre: nombre.trim(),
          asistencia: asistencia.trim(),
          restricciones: (restricciones || '').trim(),
          fecha: new Date().toLocaleString('es-ES')
        })
      });
    }

    chatSend.addEventListener('click', sendMsg);
    chatInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') sendMsg();
    });

    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', function() {
        document.body.style.height = window.visualViewport.height + 'px';
      });
    }

    chatInput.focus();
  </script>
</body>
</html>
